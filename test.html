<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>SecureConsult | Cyber Security Advisory</title>

<style>

/* Header layout */

.header-container{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 40px;
  background:#f8f8f8;
}

/* Main menu */

.menu{
  list-style:none;
  display:flex;
  margin:0;
  padding:0;
}

.menu li{
  position:relative;
  margin-left:25px;
}

.menu a{
  text-decoration:none;
  font-family:Arial;
  color:#222;
  padding:8px 10px;
  display:block;
}

.menu a:hover{
  color:#0077cc;
}

/* Submenu */

.submenu{
  display:none;
  position:absolute;
  top:100%;
  left:0;
  background:white;
  list-style:none;
  padding:0;
  margin:0;
  min-width:180px;
  border:1px solid #ddd;
}

/* Submenu items */

.submenu li{
  margin:0;
}

.submenu a{
  padding:10px 15px;
  color:#333;
}

.submenu a:hover{
  background:#f0f0f0;
}

/* Show dropdown */

.dropdown:hover .submenu{
  display:block;
}

</style>
</head>
<body>



<header>
  <div class="header-container">

    <div class="logo">
      CyberSecure
    </div>

    <nav>
      <ul class="menu">

        <li><a href="#">Home</a></li>

        <li class="dropdown">
          <a href="#">Services</a>

          <ul class="submenu">
            <li><a href="#">Penetration Testing</a></li>
            <li><a href="#">Security Audit</a></li>
            <li><a href="#">Vulnerability Assessment</a></li>
          </ul>

        </li>

        <li><a href="#">About</a></li>
        <li><a href="#">Contact</a></li>

      </ul>
    </nav>

  </div>
</header>



</body>
</html>
