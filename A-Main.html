<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>SecureConsult | Cyber Security Advisory</title>

        <link rel="stylesheet" href="css/test.css">
        <link rel="stylesheet" href="css/constants.css">
        <link rel="stylesheet" href="css/body.css">
        <link rel="stylesheet" href="css/header.css">
        <style>

/* HERO */

.hero{
text-align:center;
padding:120px 30px;
background:#111827;
}

.hero h1{
font-size:62px;  /*was 42px */
margin-bottom:20px;
}

.hero p{
font-size:18px;
margin-bottom:30px;
}

button{
padding:12px 25px;
margin:10px;
border:none;
border-radius:4px;
background:#3b82f6;
color:white;
cursor:pointer;
}

/* new addition ***********************************/ 
.hero{
  background-image: 
  linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
  url("images/motherboard.png");
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;

  height: 300px; / * was 500 px */
  color: white;
  text-align: center;
  padding-top: 150px;
}


/****************************** upto here new*/

/* SERVICES */

.services{
display:flex;
justify-content:center;
gap:40px;
padding:80px;
}

.service{
background:#1f2937;
padding:30px;
border-radius:8px;
width:250px;
}

/* ABOUT */

.about{
padding:80px;
text-align:center;
background:#020617;
}

/* CTA */

.cta{
text-align:center;
padding:80px;
}

.cta button{
background:#22c55e;
}

/* FOOTER */

footer{
background:#020617;
padding:40px;
display:flex;
justify-content:space-around;
font-size:14px;
}

/* TRUST STORY */

.customer-trust{
    padding:60px 40px;
    background:#f5f5f5;
    text-align:center;

}

.customer-trust h2{
    font-size:28px;
    margin-bottom:40px;
    text-align:center;
   color: --herocaptiontextcolor;
}

.trust-container{
    display:flex;
    max-width:1100px;
    margin:auto;
    background:white;
    border-radius:20px;
    overflow:hidden;
}

/* left image */

.trust-image img{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* image column */

.trust-image{
    flex:1;
}

/* text column */

.trust-text{
    flex:1;
    padding:40px;
    text-align:left;
}

.quote{
    font-size:20px;
    font-weight:500;
    margin-bottom:20px;
}

.author{
    font-size:14px;
    color:#555;
    margin-bottom:25px;
}

/* buttons */

.buttons{
    display:flex;
    gap:10px;
}

.btn-red{
    background:#e60023;
    color:white;
    padding:10px 16px;
    text-decoration:none;
    border-radius:6px;
}

.btn-outline{
    border:1px solid #333;
    padding:10px 16px;
    text-decoration:none;
    border-radius:6px;
    color:#333;
}

/* TRUST STORY END */


</style>

</head>
<body>
    <div id="test_area" class="test_class">TEST</div>
    <div id="header"></div>
    <div id="hero_section"></div>
    <div id="footer"></div>

    <script src="js/include.js"></script>
</body>
</html>
