header{

/* MAIN MENU CSS NEW *****************************************/
/* Main menu */

.menu{
  list-style:none;
  display:flex;
  margin:0;
  padding:0;
}

.menu li{
  position:relative;
  margin-left:25px;
}

.menu a{
  text-decoration:none;
  font-family:Arial;
  color:#e5e7eb; /*222*/
  padding:8px 10px;
  display:block;
}

.menu a:hover{
  color:#0077cc;
}

/* Submenu */

.submenu{
  display:none;
  position:absolute;
  top:100%;
  left:0;
  background:white;
  list-style:none;
  padding:0;
  margin:0;
  min-width:180px;
  border:1px solid #ddd;
}

/* Submenu items */

.submenu li{
  margin:0;
}

.submenu a{
  padding:10px 15px;
  color:#333;
}

.submenu a:hover{
  background:#f0f0f0;
}

/* Show dropdown */

.dropdown:hover .submenu{
  display:block;
}
/* MAIN MENU CSS UP TO HERE*******/







/* HERO */

.hero{
text-align:center;
padding:120px 30px;
background:#111827;
}

.hero h1{
font-size:62px;  /*was 42px */
margin-bottom:20px;
}

.hero p{

margin-bottom:30px;
}

button{
padding:12px 25px;
margin:10px;
border:none;
border-radius:4px;
background:#3b82f6;
color:white;
cursor:pointer;
}

/* new addition ***********************************/ 
.hero{
  background-image: 
  linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
  url("images/motherboard.png");
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;

  height: 300px; / * was 500 px */
  color: white;
  text-align: center;
  padding-top: 150px;
}

   color: --herocaptiontextcolor;
